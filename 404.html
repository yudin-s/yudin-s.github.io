<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting - Serge Yudin</title>
    <script>
      const route = window.location.pathname.replace(/^\/+/, '').split('/')[0];
      const section = route === 'portfolio' ? 'work' : route;
      window.location.replace('/' + (section ? '#' + section : ''));
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
